version: "3"

tasks:
  dev:
    desc: Start development server with live reload
    cmd: air

  run:
    desc: Run the application
    cmd: go run ./cmd/api/

  build:
    desc: Build the application
    cmd: go build -o bin/app ./cmd/api/

  tidy:
    desc: Tidy go modules
    cmd: go mod tidy

  seed:
    desc: Seed the database with test data
    cmd: go run ./cmd/api/ -seed

  lint:
    desc: Run Go linting checks
    cmd: golangci-lint run ./...

  test:unit:
    desc: Run unit tests and generate coverage profile (unit_coverage.out)
    cmd: go test -coverprofile=unit_coverage.out ./internal/...

  test:unit:coverage:
    desc: Run unit tests and assert coverage >= 95% across business logic (excludes internal/platform)
    deps: [test:unit]
    cmd: >
      LC_ALL=C awk '
        /^mode:/ { next }
        /internal\/platform\// { next }
        /^me\/internal\// {
          total += $2
          if ($3 > 0) covered += $2
        }
        END {
          if (total == 0) { print "no coverage data found"; exit 1 }
          pct = covered * 100 / total
          printf "unit test coverage: %.1f%%\n", pct
          if (pct < 95) { print "FAIL: below 95% threshold"; exit 1 }
        }
      ' unit_coverage.out

  test:behavior:
    desc: Run behavior/integration tests and generate coverage profile (coverage.out)
    cmd: go test -tags integration -v -coverpkg=./... -coverprofile=coverage.out ./cmd/api/

  test:behavior:coverage:
    desc: Run behavior tests and assert coverage >= 80% across business logic (excludes internal/platform)
    deps: [test:behavior]
    cmd: >
      LC_ALL=C awk '
        /^mode:/ { next }
        /internal\/platform\// { next }
        /^me\/internal\// {
          total += $2
          if ($3 > 0) covered += $2
        }
        END {
          if (total == 0) { print "no coverage data found"; exit 1 }
          pct = covered * 100 / total
          printf "behavior test coverage: %.1f%%\n", pct
          if (pct < 80) { print "FAIL: below 80% threshold"; exit 1 }
        }
      ' coverage.out

  behavior:diff:
    desc: Show which behavior tests changed since last commit
    cmd: go run ./cmd/behaviordiff/...

  up:
    cmd: docker compose up --watch --build --pull missing

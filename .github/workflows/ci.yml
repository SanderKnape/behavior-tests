name: CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - uses: jdx/mise-action@v4
      - run: task lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - uses: jdx/mise-action@v4
      - run: task test:unit:coverage
      - name: Extract coverage percentage
        id: coverage
        if: always()
        run: |
          if [ ! -f unit_coverage.out ]; then
            echo "pct=N/A" >> $GITHUB_OUTPUT
            exit 0
          fi
          PCT=$(LC_ALL=C awk '
            /^mode:/ { next }
            /internal\/platform\// { next }
            /^me\/internal\// { total += $2; if ($3 > 0) covered += $2 }
            END { if (total > 0) printf "%.1f", covered * 100 / total; else print "0.0" }
          ' unit_coverage.out)
          echo "pct=${PCT}%" >> $GITHUB_OUTPUT
      - name: Find existing coverage comment
        uses: peter-evans/find-comment@v3
        id: find-coverage-comment
        if: always()
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- unit-coverage -->
      - name: Post unit test coverage comment
        uses: peter-evans/create-or-update-comment@v4
        if: always()
        with:
          comment-id: ${{ steps.find-coverage-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- unit-coverage -->
            **Unit test coverage: ${{ steps.coverage.outputs.pct }}** (threshold: 95%)
          edit-mode: replace

  test-behavior:
    name: Behavior Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - uses: jdx/mise-action@v4
      - run: task test:behavior:coverage
      - name: Generate behavior diff
        id: behavior-diff
        run: |
          DIFF=$(go run ./cmd/behaviordiff/... ${{ github.event.pull_request.base.sha }})
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Find existing behavior diff comment
        uses: peter-evans/find-comment@v3
        id: find-diff-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- behavior-diff -->
      - name: Post behavior diff comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-diff-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- behavior-diff -->
            ${{ steps.behavior-diff.outputs.diff }}
          edit-mode: replace
